<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Viewer – QuantScanner</title>
<link rel="stylesheet" href="/qs-design.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="/qs-shared.js"></script>
<style>
.main       { display:flex; height:calc(100vh - var(--nav-h)); overflow:hidden; }
.params     { width:310px; background:var(--surface); border-right:1px solid var(--border); padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:13px; flex-shrink:0; }
.chart-area { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; min-width:0; }
.chart-hdr  { padding:10px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--surface); flex-shrink:0; }
.ct-ticker  { font-size:18px; font-weight:700; }
.ct-price   { font-size:15px; color:var(--green); }
#chart-wrap { flex:1; position:relative; min-height:0; }

/* Trend display */
.trend-display {
  font-size:19px; font-weight:700; text-align:center;
  padding:10px 14px; border-radius:8px; letter-spacing:.3px;
}
.tup  { background:#14532d22; color:#86efac; border:1px solid #166534; }
.tdn  { background:#7f1d1d22; color:#fca5a5; border:1px solid #991b1b; }
.tco  { background:#1c191522; color:#a8a29e; border:1px solid #292524; }

/* Stat grid */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.stat      { background:var(--surface); border-radius:6px; padding:8px 10px; }
.stat-l    { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.stat-v    { font-size:13px; font-weight:600; margin-top:3px; }

/* Confluence bars */
.cbar      { margin-bottom:7px; }
.cbar-row  { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:3px; }
.cbar-track{ height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.cbar-fill { height:100%; border-radius:3px; transition:width .4s; }

/* Edge table */
.etable    { width:100%; border-collapse:collapse; font-size:11px; }
.etable th { text-align:left; padding:4px 6px; border-bottom:1px solid var(--border); color:var(--muted); font-weight:500; font-size:10px; }
.etable td { padding:4px 6px; border-bottom:1px solid #1a1f2822; }
.etable tr:last-child td { border:none; }
.pos { color:var(--green); } .neg { color:var(--red); }
</style>
</head>
<body>
<nav class="qs-nav" id="qs-nav"></nav>
<div class="main">

  <!-- ── Params ── -->
  <div class="params">
    <div>
      <div class="sec-title" style="margin-bottom:8px">Symbol</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="tkr" class="ctrl" placeholder="RELIANCE"
               style="flex:1;font-size:14px;font-weight:600;letter-spacing:.4px"
               onkeydown="if(event.key==='Enter')analyse()">
        <button class="btn btn-primary btn-sm" onclick="analyse()">Go</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sec-title">Parameters</div>
    <div class="field">
      <label class="ctrl-label">Timeframe</label>
      <select id="tfs" class="ctrl">
        <option value="1d">Daily (1D)</option>
        <option value="1wk">Weekly (1W)</option>
        <option value="1h">Hourly (1H)</option>
        <option value="4h">4-Hour</option>
        <option value="15m">15-Min</option>
      </select>
    </div>
    <div class="field">
      <label class="ctrl-label">Lookback Days</label>
      <input type="number" id="days" class="ctrl" value="500" min="50" max="3000">
    </div>
    <div class="field">
      <label class="ctrl-label">Pivot Order (look-left/right bars)</label>
      <input type="number" id="ord" class="ctrl" value="5" min="1" max="50">
    </div>
    <div class="field">
      <label class="ctrl-label">Min Strength % of Price (0 = off)</label>
      <input type="number" id="msp" class="ctrl" value="0" step="0.1" min="0" max="5">
    </div>
    <div class="field">
      <label class="ctrl-label">ATR Strength Multiplier (0 = off)</label>
      <input type="number" id="atr" class="ctrl" value="0.0" step="0.1" min="0" max="5">
    </div>


    <div class="divider"></div>
    <div class="sec-title" style="margin-bottom:8px">Multi-Order Analysis</div>
    
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <input type="checkbox" id="tv-mo-enable"
            style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer"
            onchange="tvToggleMO(this.checked)">
      <label for="tv-mo-enable" style="font-size:12px;cursor:pointer">Enable Multi-Order</label>
    </div>
    
    <div id="tv-mo-inputs" style="display:flex;flex-direction:column;gap:8px;opacity:.35;pointer-events:none">
      <div class="field">
        <label class="ctrl-label">High Order</label>
        <input type="number" id="tv-mo-high" class="ctrl" value="20" min="1" max="100">
      </div>
      <div class="field">
        <label class="ctrl-label">Mid Order</label>
        <input type="number" id="tv-mo-mid" class="ctrl" value="10" min="1" max="60">
      </div>
      <div class="field">
        <label class="ctrl-label">Low Order</label>
        <input type="number" id="tv-mo-low" class="ctrl" value="5" min="1" max="30">
      </div>
    </div>

    <button class="btn btn-primary" id="abtn" onclick="analyse()">Analyse</button>

    <div class="divider"></div>

    <!-- Results -->
    <div id="res" style="display:none;flex-direction:column;gap:12px">
 
      <!-- Trend label -->
      <div id="tdisp" class="trend-display tco">–</div>
    
      <!-- Core stats grid -->
      <div class="stat-grid" id="sgs"></div>
    
      <!-- ── Multi-Order Breakdown (replaces HTF score) ── -->
      <div id="tv-mo-section" style="display:none">
        <div class="sec-title" style="margin-bottom:8px">
          Multi-Order Breakdown
          <span id="tv-mo-align-dots" style="margin-left:8px;color:var(--amber);font-size:11px"></span>
        </div>
        <div id="tv-mo-bars" style="display:flex;flex-direction:column;gap:6px"></div>
      </div>
    
      <!-- Velocity / Amplitude / Leg Ratio -->
      <div>
        <div class="sec-title" style="margin-bottom:8px">Structure Metrics</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px" id="tv-struct-grid"></div>
      </div>
    
      <!-- Confluence bars (original — HTF bar now replaced by MO) -->
      <div>
        <div class="sec-title" style="margin-bottom:8px">Confluence Breakdown</div>
        <div id="cbars"></div>
      </div>
    
      <!-- Edge table -->
      <div>
        <div class="sec-title" style="margin-bottom:8px">Edge Measurement</div>
        <table class="etable">
          <thead><tr><th>Type</th><th>Bars</th><th>N</th><th>Hit%</th><th>Avg R</th><th>Payoff</th></tr></thead>
          <tbody id="etb"></tbody>
        </table>
      </div>
    </div>
      </div>

  <!-- ── Chart area ── -->
  <div class="chart-area">
    <div class="overlay" id="ov"><div class="spinner spinner-lg"></div></div>

    <div class="chart-hdr">
      <span class="ct-ticker" id="ch-t">–</span>
      <span class="ct-price"  id="ch-p">–</span>
      <div id="ch-tb" style="font-size:11px;padding:2px 10px;border-radius:99px;background:var(--surface3)">–</div>
      <div class="tf-group" style="margin-left:auto" id="tfg">
        <button class="tf-btn active" onclick="qtf('1d',this)">1D</button>
        <button class="tf-btn" onclick="qtf('1wk',this)">1W</button>
        <button class="tf-btn" onclick="qtf('1h',this)">1H</button>
      </div>
    </div>

    <div class="legend-row">
      <span class="leg-item"><span class="leg-dot" style="background:#ef4444"></span>Top (T)</span>
      <span class="leg-item"><span class="leg-dot" style="background:#22c55e"></span>Bottom (B)</span>
      <span class="leg-item"><span class="leg-line" style="background:#a78bfa"></span>Pivot line</span>
      <span id="pcnt" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
    </div>

    <div id="chart-wrap"></div>
  </div>

</div>

<script>
renderNav('trend');
function tvToggleMO(enabled) {
  const inp = document.getElementById('tv-mo-inputs');
  inp.style.opacity      = enabled ? '1'    : '.35';
  inp.style.pointerEvents = enabled ? 'auto' : 'none';
  // Save state
  saveState({ tv_mo_enable: enabled,
    tv_mo_high: G('tv-mo-high').value,
    tv_mo_mid:  G('tv-mo-mid').value,
    tv_mo_low:  G('tv-mo-low').value });
}

const API = '/api';
let chart=null, cs=null, pls=null, curTicker=null;

// ── Restore state ──────────────────────────────────────────────────────
(function restore() {
  const s = loadState();
  if (s.trend_tkr)  G('tkr').value  = s.trend_tkr;
  if (s.trend_tfs)  G('tfs').value  = s.trend_tfs;
  if (s.trend_days) G('days').value = s.trend_days;
  if (s.trend_ord)  G('ord').value  = s.trend_ord;
  if (s.trend_msp)  G('msp').value  = s.trend_msp;
  if (s.trend_atr)  G('atr').value  = s.trend_atr;
  // Re-run last analysis automatically
  if (s.trend_tkr) setTimeout(analyse, 400);
})();

function G(id) { return document.getElementById(id); }

function initChart() {
  const wrap = G('chart-wrap');
  wrap.innerHTML = '';
  if (chart) { try { chart.remove(); } catch(e){} }
  chart = createQSChart(wrap);
  cs    = addCandleSeries(chart);
  pls   = addLineSeries(chart, '#a78bfa66', 1, 0);
}

function renderChart(d) {
  cs.setData(d.candles);
  if (d.pivots?.length) {
    pls.setData(d.pivots.map(p => ({time:p.time, value:p.value})));
    G('pcnt').textContent = `${d.pivots.length} pivots`;
  }
  cs.setMarkers((d.pivots||[]).map(p => ({
    time:p.time, size:1.5,
    position: p.type==='T' ? 'aboveBar':'belowBar',
    color:    p.type==='T' ? '#ef4444' :'#22c55e',
    shape:    p.type==='T' ? 'arrowDown':'arrowUp',
  })));
  chart.timeScale().fitContent();
}

async function analyse() {
  const ticker = (G('tkr').value||'').trim().toUpperCase();
  if (!ticker) return;
  curTicker = ticker;
 
  const moEnabled = G('tv-mo-enable').checked;
 
  saveState({
    trend_tkr:  ticker,
    trend_tfs:  G('tfs').value,
    trend_days: G('days').value,
    trend_ord:  G('ord').value,
    trend_msp:  G('msp').value,
    trend_atr:  G('atr').value,
    tv_mo_enable: moEnabled,
    tv_mo_high:   G('tv-mo-high').value,
    tv_mo_mid:    G('tv-mo-mid').value,
    tv_mo_low:    G('tv-mo-low').value,
  });
 
  const params = new URLSearchParams({
    interval:          G('tfs').value,
    days:              G('days').value,
    order:             G('ord').value,
    min_strength_pct:  G('msp').value,
    atr_mult:          G('atr').value,
    multi_order:       moEnabled,
    order_low:         G('tv-mo-low').value,
    order_mid:         G('tv-mo-mid').value,
    order_high:        G('tv-mo-high').value,
  });
 
  G('ov').classList.add('visible');
  G('abtn').disabled = true;
  if (!chart) initChart();
 
  try {
    const r = await fetch(`${API}/trend/${encodeURIComponent(ticker)}?${params}`);
    const d = await r.json();
    if (d.error) { alert(d.error); return; }
    renderChart(d);
    renderResults(d);
    G('ch-t').textContent = ticker;
    G('ch-p').textContent = '₹' + (d.last_price||'–');
    const tb = G('ch-tb');
    tb.textContent  = (d.trend||'').replace(/_/g,' ');
    tb.style.cssText = `font-size:11px;padding:2px 10px;border-radius:99px;${trendHeaderStyle(d.trend)}`;
  } catch(e) { alert('Error: ' + e.message); }
  finally {
    G('ov').classList.remove('visible');
    G('abtn').disabled = false;
  }
}

function renderResults(d) {
  const res = G('res');
  res.style.display = 'flex'; res.style.flexDirection='column'; res.style.gap='12px';
 
  const td  = G('tdisp');
  td.textContent = (d.trend||'–').replace(/_/g,' ');
  const cls = UP_TRENDS.has(d.trend)?'tup':DN_TRENDS.has(d.trend)?'tdn':'tco';
  td.className   = 'trend-display ' + cls;
 
  const c  = d.confluence  || {};
  const ts = d.trend_strength || {};
 
  G('sgs').innerHTML = [
    ['Confluence', pct(c.score)],
    ['ATR %',      (c.atr_pct||0).toFixed(2)+'%'],
    ['Trend Str.', ts.classification||'–'],
    ['Pivots',     d.pivot_count||0],
    ['Vol Score',  pct(c.vol_score)],
    ['Zone Score', pct(c.zone_score)],
  ].map(([l,v])=>`<div class="stat"><div class="stat-l">${l}</div><div class="stat-v">${v}</div></div>`).join('');
 
  // ── Structure metrics (velocity / amplitude / leg ratio) ───────────
  const vel = d.velocity  || {};
  const amp = d.amplitude || {};
  const lr  = d.leg_ratio || {};
  const velSign = (vel.current_vel||0) >= 0 ? '+' : '';
  const accelIcon = vel.accel_label==='accelerating'?'↑':vel.accel_label==='decelerating'?'↓':'→';
 
  G('tv-struct-grid').innerHTML = [
    ['Velocity',     `${velSign}${vel.current_vel??'–'} pts/bar`, `${accelIcon} ${vel.accel_label||'–'}`],
    ['Avg Velocity', `${vel.avg_velocity??'–'}`, `trend net: ${vel.trend_vel??'–'}`],
    ['Amplitude',    `${amp.avg_amplitude??'–'} avg`, amp.regime||'–'],
    ['Recent Amp',   `${amp.recent_avg??'–'}`,   `${amp.variance_pct??'–'}% variance`],
    ['Leg Ratio',    `${lr.ratio??'–'}×`,         (lr.label||'–').replace(/_/g,' ')],
    ['Recent Ratio', `${lr.recent_ratio??'–'}×`,  `Bull ${lr.avg_bull??'–'} / Bear ${lr.avg_bear??'–'}`],
  ].map(([l,v,s])=>`
    <div class="stat">
      <div class="stat-l">${l}</div>
      <div class="stat-v">${v}</div>
      ${s?`<div style="font-size:10px;color:var(--muted);margin-top:1px">${s}</div>`:''}
    </div>`).join('');
 
  // ── Multi-order breakdown ──────────────────────────────────────────
  const moSec = G('tv-mo-section');
  const mo    = d.multiorder;
  if (mo) {
    moSec.style.display = 'block';
    const alignStr = '●'.repeat(mo.alignment||0)+'○'.repeat(3-(mo.alignment||0));
    G('tv-mo-align-dots').textContent = `${alignStr} ${mo.alignment}/3 · ${(mo.combined_trend||'').replace(/_/g,' ')}`;
 
    G('tv-mo-bars').innerHTML = ['high','mid','low'].map(lv => {
      const lv_d  = mo[lv] || {};
      const t     = lv_d.trend || '–';
      const s     = lv_d.score ?? 0;
      const pctW  = Math.round((s + 1) / 2 * 100);
      const col   = trendHeaderStyle(t).match(/color:([^;]+)/)?.[1] || '#8892a0';
      const v_d   = lv_d.velocity   || {};
      const a_d   = lv_d.amplitude  || {};
      const lr_d  = lv_d.leg_ratio  || {};
      return `
      <div style="margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px;font-weight:700;color:${col}">${lv.toUpperCase()}(${lv_d.order})</span>
          <span style="font-size:11px;color:${col}">${t.replace(/_/g,' ')}</span>
          <span style="font-size:10px;color:var(--muted)">${pctW}%</span>
        </div>
        <div class="cbar-track"><div class="cbar-fill" style="width:${pctW}%;background:${col}"></div></div>
        <div style="display:flex;gap:12px;margin-top:4px;font-size:10px;color:var(--muted)">
          <span>Vel: ${v_d.current_vel??'–'}</span>
          <span>Amp: ${a_d.avg_amplitude??'–'}</span>
          <span>LR: ${lr_d.ratio??'–'}× ${(lr_d.label||'').replace(/_/g,' ')}</span>
        </div>
      </div>`;
    }).join('');
  } else {
    moSec.style.display = 'none';
  }
 
  // ── Confluence bars — replace HTF row if MO available ─────────────
  const cbarItems = [
    ['Trend', c.trend_score||0, '#3b82f6'],
    ['Zone',  c.zone_score ||0, '#22c55e'],
    ['HTF',   mo ? (mo.alignment/3) : (c.htf_score||0), mo ? '#f59e0b' : '#a78bfa'],
    ['Vol',   c.vol_score  ||0, '#f59e0b'],
  ];
  G('cbars').innerHTML = cbarItems.map(([l,v,col])=>`<div class="cbar">
    <div class="cbar-row"><span>${l}${mo&&l==='HTF'?' (alignment)':''}</span><span>${Math.round(v*100)}%</span></div>
    <div class="cbar-track"><div class="cbar-fill" style="width:${Math.round(v*100)}%;background:${col}"></div></div>
  </div>`).join('');
 
  // Edge table (unchanged)
  G('etb').innerHTML = (d.edge?.length) ? d.edge.map(r=>`<tr>
    <td style="color:${r.type==='B'?'var(--green)':'var(--red)'}">${r.type==='B'?'Bull':'Bear'}</td>
    <td>${r.horizon}b</td><td>${r.n}</td>
    <td class="${r.hit_rate>0.5?'pos':'neg'}">${r.hit_rate!=null?(r.hit_rate*100).toFixed(0)+'%':'–'}</td>
    <td class="${r.avg_R>0?'pos':'neg'}">${r.avg_R!=null?r.avg_R.toFixed(2)+'%':'–'}</td>
    <td>${r.payoff!=null?r.payoff.toFixed(2):'–'}</td>
  </tr>`).join('')
  : '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:10px">Not enough pivot history</td></tr>';
}
 
// Restore MO state
(function restoreMO() {
  const s = loadState();
  if (s.tv_mo_enable) {
    G('tv-mo-enable').checked = s.tv_mo_enable;
    tvToggleMO(s.tv_mo_enable);
  }
  if (s.tv_mo_high) G('tv-mo-high').value = s.tv_mo_high;
  if (s.tv_mo_mid)  G('tv-mo-mid').value  = s.tv_mo_mid;
  if (s.tv_mo_low)  G('tv-mo-low').value  = s.tv_mo_low;
})();

async function qtf(t, btn) {
  G('tfs').value = t;
  document.querySelectorAll('#tfg .tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (curTicker) await analyse();
}
</script>
</body>
</html>
