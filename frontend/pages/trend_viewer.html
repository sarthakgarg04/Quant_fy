<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Viewer – QuantScanner</title>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
</head>
<body>

<nav id="qs-nav"></nav>

<div class="tv-main">

  <!-- ── Params panel ── -->
  <div class="tv-params">
    <div>
      <div class="slbl" style="margin-bottom:8px">Symbol</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="tkr" class="ctrl" placeholder="RELIANCE"
               style="flex:1;font-size:14px;font-weight:600;letter-spacing:.4px"
               onkeydown="if(event.key==='Enter') Trend.analyse()">
        <button class="btn btn-primary btn-sm" onclick="Trend.analyse()">Go</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="slbl">Parameters</div>

    <div class="field">
      <label class="ctrl-label">Timeframe</label>
      <select id="tfs" class="ctrl">
        <option value="1d">Daily (1D)</option>
        <option value="1wk">Weekly (1W)</option>
        <option value="1h">Hourly (1H)</option>
        <option value="4h">4-Hour</option>
        <option value="15m">15-Min</option>
      </select>
    </div>
    <div class="field">
      <label class="ctrl-label">Lookback Days</label>
      <input type="number" id="days" class="ctrl" value="500" min="50" max="3000">
    </div>
    <div class="field">
      <label class="ctrl-label">Pivot Order</label>
      <input type="number" id="ord" class="ctrl" value="5" min="1" max="50">
    </div>
    <div class="field">
      <label class="ctrl-label">Min Strength % of Price (0 = off)</label>
      <input type="number" id="msp" class="ctrl" value="0" step="0.1" min="0" max="5">
    </div>
    <div class="field">
      <label class="ctrl-label">ATR Strength Multiplier (0 = off)</label>
      <input type="number" id="atr" class="ctrl" value="0.0" step="0.1" min="0" max="5">
    </div>

    <div class="divider"></div>
    <div class="slbl" style="margin-bottom:8px">Multi-Order Analysis</div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <input type="checkbox" id="tv-mo-enable"
             style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer"
             onchange="Trend.toggleMO(this.checked)">
      <label for="tv-mo-enable" style="font-size:12px;cursor:pointer">Enable Multi-Order</label>
    </div>

    <div id="tv-mo-inputs" style="display:flex;flex-direction:column;gap:8px;opacity:.35;pointer-events:none">
      <div class="field">
        <label class="ctrl-label">High Order</label>
        <input type="number" id="tv-mo-high" class="ctrl" value="20" min="1" max="100">
      </div>
      <div class="field">
        <label class="ctrl-label">Mid Order</label>
        <input type="number" id="tv-mo-mid" class="ctrl" value="10" min="1" max="60">
      </div>
      <div class="field">
        <label class="ctrl-label">Low Order</label>
        <input type="number" id="tv-mo-low" class="ctrl" value="5" min="1" max="30">
      </div>
    </div>

    <button class="btn btn-primary" id="abtn" onclick="Trend.analyse()">Analyse</button>

    <div class="divider"></div>

    <!-- Results -->
    <div id="tv-res" style="display:none;flex-direction:column;gap:12px">

      <div id="tv-tdisp" class="trend-display tco">–</div>

      <div class="tv-stat-grid" id="tv-sgs"></div>

      <div id="tv-mo-section" style="display:none">
        <div class="slbl" style="margin-bottom:8px">
          Multi-Order Breakdown
          <span id="tv-mo-align" style="margin-left:8px;color:var(--amber);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0"></span>
        </div>
        <div id="tv-mo-bars" style="display:flex;flex-direction:column;gap:6px"></div>
      </div>

      <div>
        <div class="slbl" style="margin-bottom:8px">Structure Metrics</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px" id="tv-struct-grid"></div>
      </div>

      <div>
        <div class="slbl" style="margin-bottom:8px">Confluence Breakdown</div>
        <div id="tv-cbars"></div>
      </div>

      <div>
        <div class="slbl" style="margin-bottom:8px">Edge Measurement</div>
        <table class="etable">
          <thead><tr><th>Type</th><th>Bars</th><th>N</th><th>Hit%</th><th>Avg R</th><th>Payoff</th></tr></thead>
          <tbody id="tv-etb"></tbody>
        </table>
      </div>

    </div><!-- tv-res -->
  </div><!-- tv-params -->

  <!-- ── Chart area ── -->
  <div class="tv-chart-area">
    <div class="overlay" id="tv-overlay"></div>

    <div class="tv-chart-hdr">
      <span class="tv-ticker" id="tv-ticker">—</span>
      <span class="tv-price"  id="tv-price">—</span>
      <div id="tv-trend-badge" style="font-size:11px;padding:2px 10px;border-radius:99px;background:var(--s3)">—</div>
      <div class="tfg" style="margin-left:auto" id="tfg">
        <button class="tfb on" onclick="Trend.quickTF('1d',this)">1D</button>
        <button class="tfb"    onclick="Trend.quickTF('1wk',this)">1W</button>
        <button class="tfb"    onclick="Trend.quickTF('1h',this)">1H</button>
      </div>
    </div>

    <div class="cpleg">
      <span class="li"><span class="ld" style="background:#ef4444"></span>Top (T)</span>
      <span class="li"><span class="ld" style="background:#22c55e"></span>Bottom (B)</span>
      <span id="tv-pcnt" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
    </div>

    <div id="tv-chart-wrap">
      <div id="cload" style="position:absolute;inset:0;z-index:50;background:rgba(13,15,18,.75);display:none;align-items:center;justify-content:center">
        <div class="spinner spinner-lg"></div>
      </div>
    </div>

  </div><!-- tv-chart-area -->
</div><!-- tv-main -->

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/api.js"></script>
<script src="/js/chart.js"></script>
<script src="/js/trend.js"></script>
</body>
</html>
